services:
  db:
    image: postgres:16-alpine
    container_name: flowboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowboard
      POSTGRES_PASSWORD: flowboard
      POSTGRES_DB: flowboard
    ports:
      - "5432:5432"
    volumes:
      - flowboard-db-data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowboard -d flowboard"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  flowboard-db-data:
